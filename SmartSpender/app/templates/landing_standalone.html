<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart$pender — Intelligent Finance Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020817;
            color: #ddeeff;
            overflow: hidden;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(2, 8, 23, 0.65);
            z-index: -1;
        }

        .bg-grid {
            position: fixed;
            inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 52px 52px;
            pointer-events: none;
        }

        /* Centered Logo */
        .logo-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10; width: 100%;
            animation: fadeInUp 0.9s ease both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }

        .brand-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #00e5ff;
            box-shadow: 0 0 18px rgba(0,229,255,0.25);
            margin: 0 auto 22px;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            color: white;
            letter-spacing: -0.03em;
        }

        .logo span {
            color: #00e5ff;
            text-shadow: 0 0 30px rgba(0,229,255,0.3);
        }

        .tagline {
            margin-top: 16px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.06em;
            font-weight: 400;
            font-family: 'Space Mono', monospace;
        }

        /* Bottom Buttons */
        .buttons {
            position: fixed;
            bottom: 56px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex; gap: 16px;
            animation: fadeInUp 0.9s ease 0.15s both;
        }

        .btn {
            padding: 13px 32px;
            font-size: 0.9rem; font-weight: 600;
            font-family: 'Outfit', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c9e0, #0091b5);
            color: white;
            box-shadow: 0 4px 20px rgba(0,200,224,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0,200,224,0.45);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.14);
        }
        .btn-ghost:hover {
            background: rgba(0,229,255,0.08);
            border-color: rgba(0,229,255,0.3);
            color: #00e5ff;
            transform: translateY(-3px);
        }

        /* Backdrop */
        .backdrop {
            position: fixed; inset: 0;
            z-index: 2999;
            background: rgba(2,8,23,0.6);
            display: none;
            /* NO backdrop-filter here — causes lag on the panel behind it */
        }
        .backdrop.open { display: block; }

        /* Slide Panel — solid background, NO backdrop-filter */
        .slide-panel {
            position: fixed;
            top: 0; right: 0;
            width: 100%; max-width: 420px;
            height: 100%;
            background: #060e22; /* solid, no blur needed */
            border-left: 1px solid rgba(255,255,255,0.08);
            box-shadow: -20px 0 60px rgba(0,0,0,0.6);
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            z-index: 3000;
            overflow-y: auto;
            /* NO backdrop-filter — this was causing the typing lag */
            will-change: transform; /* GPU hint for smooth slide animation only */
        }
        .slide-panel.open { transform: translateX(0); }

        .panel-inner {
            padding: 52px 40px;
            min-height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* Top accent line */
        .panel-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #00e5ff, #7c3aed);
        }

        .close-btn {
            position: absolute;
            top: 18px; right: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            width: 34px; height: 34px;
            border-radius: 50%;
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: rgba(255,77,109,0.1);
            border-color: rgba(255,77,109,0.2);
            color: #ff4d6d;
            transform: rotate(90deg);
        }

        .panel-brand {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: #00e5ff; margin-bottom: 40px;
        }

        .panel-title {
            font-size: 2rem; font-weight: 800;
            color: #fff; letter-spacing: -0.03em;
            margin-bottom: 6px;
        }

        .panel-sub {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.32);
            margin-bottom: 36px; line-height: 1.5;
        }

        .panel-error {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.25);
            color: #ff4d6d; border-radius: 10px;
            padding: 10px 14px; font-size: 0.8rem;
            text-align: center; margin-bottom: 18px;
            display: none;
        }

        .field { margin-bottom: 18px; }

        .field label {
            display: block;
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            font-family: 'Space Mono', monospace;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%; padding: 13px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff;
            font-size: 0.9rem; font-family: 'Outfit', sans-serif;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            /* Solid background — no blur on inputs either */
        }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .field input:focus {
            border-color: rgba(0,229,255,0.4);
            background: rgba(0,229,255,0.04);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.07);
        }

        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #00c9e0, #0091b5);
            border: none; border-radius: 12px;
            color: #fff; font-size: 0.95rem; font-weight: 700;
            font-family: 'Outfit', sans-serif; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 6px;
            box-shadow: 0 4px 20px rgba(0,200,224,0.22);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,200,224,0.38);
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 26px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: rgba(255,255,255,0.07);
        }
        .divider span {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.22);
            font-family: 'Space Mono', monospace;
        }

        .switch-link {
            text-align: center; font-size: 0.83rem;
            color: rgba(255,255,255,0.3);
        }
        .switch-link a {
            color: #00e5ff; text-decoration: none; font-weight: 600;
        }
        .switch-link a:hover { text-decoration: underline; }

        @media (max-width: 576px) {
            .buttons { flex-direction: column; align-items: center; gap: 12px; bottom: 40px; }
            .btn { padding: 12px 28px; font-size: 0.85rem; }
            .slide-panel { max-width: 100%; }
            .panel-inner { padding: 44px 24px; }
        }
    </style>
</head>
<body>

<video class="video-background" autoplay loop muted playsinline>
    <source src="{{ url_for('static', path='video/background.mp4') }}" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="bg-grid"></div>

<div class="logo-container">
    <div class="brand-dot"></div>
    <div class="logo">Smart<span>Spender</span></div>
    <div class="tagline">Intelligent Finance Tracking</div>
</div>

<div class="buttons">
    <button class="btn btn-primary" onclick="openPanel('register')">Create Account</button>
    <button class="btn btn-ghost"   onclick="openPanel('login')">Sign In</button>
</div>

<div class="backdrop" id="backdrop" onclick="closePanel()"></div>

<div class="slide-panel" id="slidePanel">
    <div class="panel-inner">
        <button class="close-btn" onclick="closePanel()">✕</button>
        <div class="panel-brand">Smart$pender</div>
        <div id="panelContent"></div>
    </div>
</div>

<script>
    function openPanel(type) {
        const content = document.getElementById('panelContent');

        if (type === 'login') {
            content.innerHTML = `
                <div class="panel-title">Welcome back</div>
                <div class="panel-sub">Sign in to your account</div>
                <div class="panel-error" id="panel-error"></div>
                <form id="authForm">
                    <div class="field">
                        <label>Username or Email</label>
                        <input type="text" name="username" placeholder="Enter your username or email" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="submit-btn">Sign In →</button>
                </form>
                <div class="divider"><span>or</span></div>
                <p class="switch-link">No account? <a href="#" onclick="openPanel('register');return false;">Create one free</a></p>
            `;
            document.getElementById('authForm').addEventListener('submit', async e => {
                e.preventDefault();
                const btn = e.target.querySelector('.submit-btn');
                btn.textContent = 'Signing in…'; btn.disabled = true;
                const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
                if (res.redirected) { window.location.href = res.url; return; }
                btn.textContent = 'Sign In →'; btn.disabled = false;
                showError('Invalid username or password');
            });

        } else {
            content.innerHTML = `
                <div class="panel-title">Create account</div>
                <div class="panel-sub">Start tracking your finances today</div>
                <div class="panel-error" id="panel-error"></div>
                <form id="authForm">
                    <div class="field">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Choose a username" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="you@email.com" required autocomplete="email">
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="submit-btn">Create Account →</button>
                </form>
                <div class="divider"><span>or</span></div>
                <p class="switch-link">Already have an account? <a href="#" onclick="openPanel('login');return false;">Sign in</a></p>
            `;
            document.getElementById('authForm').addEventListener('submit', async e => {
                e.preventDefault();
                const btn = e.target.querySelector('.submit-btn');
                btn.textContent = 'Creating…'; btn.disabled = true;
                const res = await fetch('/register', { method: 'POST', body: new FormData(e.target) });
                if (res.redirected) { window.location.href = res.url; return; }
                const txt = await res.text();
                btn.textContent = 'Create Account →'; btn.disabled = false;
                showError(txt.includes('exists') ? 'Username or email already taken' : 'Something went wrong. Try again.');
            });
        }

        document.getElementById('slidePanel').classList.add('open');
        document.getElementById('backdrop').classList.add('open');
    }

    function closePanel() {
        document.getElementById('slidePanel').classList.remove('open');
        document.getElementById('backdrop').classList.remove('open');
    }

    function showError(msg) {
        const el = document.getElementById('panel-error');
        if (!el) return;
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3500);
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>

</body>
</html>
