{% extends "authenticated-base.html" %}

{% block title %}Budget - Smart$pender{% endblock %}

{% block subpage_content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><span class="material-symbols-outlined me-2">target</span> Monthly Budget Limits</span>
                <button class="btn btn-primary btn-sm" onclick="showBudgetModal()">
                    <span class="material-symbols-outlined me-1">add</span>
                    Set Budget
                </button>
            </div>
            <div class="card-body" id="budget-status">
                <div class="text-center text-muted">Loading budget data...</div>
            </div>
        </div>
    </div>
</div>

<!-- Budget Modal -->
<div class="modal fade" id="budgetModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Set Budget Limit</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">Category</label><select id="budget-category" class="form-select"><option value="food">Food</option><option value="transport">Transport</option><option value="entertainment">Entertainment</option><option value="shopping">Shopping</option><option value="bills">Bills</option><option value="health">Health</option><option value="other">Other</option></select></div>
                <div class="mb-3"><label class="form-label">Monthly Limit ($)</label><input type="number" id="budget-limit" class="form-control" placeholder="Enter amount" required></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="saveBudgetAndRefresh()">Save</button></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/finance.js') }}"></script>
<script>
    async function loadBudgetStatus() {
        try {
            const budgets = await apiCall('/reports/budget-status');
            const container = document.getElementById('budget-status');
            if (budgets.length === 0) {
                container.innerHTML = '<div class="text-center text-muted">No budgets set. Click "Set Budget" to start!</div>';
                return;
            }
            container.innerHTML = '';
            budgets.forEach(b => {
                const percent = b.percentage_used;
                const barClass = b.status === 'on_track' ? 'progress-bar-success' : 'progress-bar-danger';
                container.innerHTML += `
                    <div class="budget-card ${b.status} mb-3">
                        <div class="d-flex justify-content-between mb-2">
                            <strong>${b.category.charAt(0).toUpperCase() + b.category.slice(1)}</strong>
                            <span>$${b.spent.toFixed(2)} / $${b.budget.toFixed(2)}</span>
                        </div>
                        <div class="progress mb-2">
                            <div class="progress-bar ${barClass}" role="progressbar" style="width: ${percent}%"></div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <small class="text-muted">Remaining: $${b.remaining.toFixed(2)}</small>
                            <small class="${b.status === 'on_track' ? 'text-success' : 'text-danger'}">${b.status === 'on_track' ? '✅ On Track' : '⚠️ Over Budget'}</small>
                        </div>
                    </div>
                `;
            });
        } catch(e) { console.error(e); }
    }
    
    async function saveBudgetAndRefresh() {
        await saveBudget();
        closeModal('budgetModal');
        await loadBudgetStatus();
    }
    
    document.addEventListener('DOMContentLoaded', loadBudgetStatus);
</script>
{% endblock %}
