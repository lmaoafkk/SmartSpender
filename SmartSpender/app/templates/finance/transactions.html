{% extends "authenticated-base.html" %}

{% block title %}Transactions - Smart$pender{% endblock %}

{% block subpage_content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><span class="material-symbols-outlined me-2">receipt</span> All Transactions</span>
        <button class="btn btn-primary btn-sm" onclick="showTransactionModal()">
            <span class="material-symbols-outlined me-1">add</span>
            Add Transaction
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Date</th><th>Name</th><th>Category</th><th>Type</th><th>Amount</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="all-transactions-body">
                    <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Transaction Modal (same as dashboard) -->
<div class="modal fade" id="transactionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Transaction</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">Name</label><input type="text" id="txn-name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Amount</label><input type="number" id="txn-amount" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Type</label><select id="txn-type" class="form-select"><option value="expense">Expense</option><option value="income">Income</option></select></div>
                <div class="mb-3"><label class="form-label">Category</label><select id="txn-category" class="form-select"><option value="food">Food</option><option value="transport">Transport</option><option value="entertainment">Entertainment</option><option value="shopping">Shopping</option><option value="bills">Bills</option><option value="health">Health</option><option value="other">Other</option></select></div>
                <div class="mb-3"><label class="form-label">Date</label><input type="date" id="txn-date" class="form-control"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTransactionAndRefresh()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/finance.js') }}"></script>
<script>
    async function loadAllTransactions() {
        try {
            const transactions = await apiCall('/transactions');
            const tbody = document.getElementById('all-transactions-body');
            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No transactions yet</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            transactions.forEach(t => {
                tbody.innerHTML += `
                    <tr>
                        <td>${t.date}</td>
                        <td>${t.name}</td>
                        <td><span class="category-badge category-${t.category}">${t.category}</span></td>
                        <td><span class="badge ${t.type === 'income' ? 'bg-success' : 'bg-danger'}">${t.type}</span></td>
                        <td class="${t.type === 'income' ? 'income-text' : 'expense-text'}">${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="deleteTransactionAndRefresh(${t.id})">Delete</button></td>
                    </tr>
                `;
            });
        } catch(e) { console.error(e); }
    }
    
    async function saveTransactionAndRefresh() {
        await saveTransaction();
        closeModal('transactionModal');
        await loadAllTransactions();
    }
    
    async function deleteTransactionAndRefresh(id) {
        if (confirm('Delete this transaction?')) {
            await deleteTransaction(id);
            await loadAllTransactions();
        }
    }
    
    document.addEventListener('DOMContentLoaded', loadAllTransactions);
</script>
{% endblock %}
